<h2>介紹</h2>
<p>龜鹿是由龜板與鹿角組成的傳統食材概念，在華人飲食文化中常見於燉湯與膏類料理。龜板多取自龜甲，鹿角則來自鹿科動物角質部分。</p>

<h2>料理或飲用方式</h2>
<p>龜鹿文化常見於燉湯料理、膏類食品以及日常養生飲品。現代常見產品包含龜鹿膏、龜鹿飲與龜鹿湯塊。</p>

<h2>文化背景</h2>
<p>龜鹿文化的核心在於慢火熬煮與長時間濃縮，使原料風味融入料理。</p>
