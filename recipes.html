<section class="section">

<h2>龜鹿雞湯</h2>

<div class="recipe-card">

<h3>龜鹿雞湯</h3>

<p>

材料  
雞腿或半雞  
龜鹿湯塊  
紅棗  
枸杞  

</p>

<p>

作法  
將雞肉與所有材料放入鍋中  
加入水燉煮約 40 分鐘即可。

</p>

</div>

</section>



<section class="section">

<h2>龜鹿排骨湯</h2>

<div class="recipe-card">

<h3>龜鹿排骨湯</h3>

<p>

材料  
排骨  
龜鹿湯塊  
枸杞  
紅棗  

</p>

<p>

作法  

排骨先汆燙  
再與龜鹿湯塊一起燉煮約 50 分鐘。

</p>

</div>

</section>



<section class="section">

<h2>龜鹿熱飲</h2>

<div class="recipe-card">

<h3>龜鹿膏熱飲</h3>

<p>

將龜鹿膏加入溫水攪拌即可飲用。

</p>

</div>


<div class="recipe-card">

<h3>鹿茸粉沖泡</h3>

<p>

鹿茸粉可加入熱水、茶或咖啡中。

</p>

</div>
