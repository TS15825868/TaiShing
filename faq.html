    <div class="faq-item">
      <div class="faq-question">龜鹿膏怎麼食用？</div>
      <div class="faq-answer">可直接食用，或加入溫熱開水攪拌後飲用。</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">龜鹿飲需要加熱嗎？</div>
      <div class="faq-answer">龜鹿飲可直接飲用，也可先溫熱後飲用。</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">龜鹿湯塊怎麼使用？</div>
      <div class="faq-answer">可加入雞湯、排骨湯或其他燉湯料理中燉煮。</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">鹿茸粉怎麼食用？</div>
      <div class="faq-answer">可依個人習慣搭配溫熱飲品或加入日常飲食中。</div>
    </div>

    <div class="faq-item">
      <div class="faq-question">柒玄茶・龜鹿調飲粉怎麼使用？</div>
      <div class="faq-answer">可加入茶飲、咖啡或其他飲品中調和飲用。</div>
    </div>
