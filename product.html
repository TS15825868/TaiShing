<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>產品介紹｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<header class="header">
<a href="index.html" class="logo">
<img src="images/logo-seal.png">
<span>仙加味</span>
</a>
<div class="menu-btn">☰</div>
</header>

<!-- 🔥 必加 -->
<div id="menuOverlay" class="menu-overlay"></div>

<main>

<section class="section">

<div class="product-layout">

<!-- 左：圖片 -->
<div>
<img id="product-image" src="images/logo-seal.png">
</div>

<!-- 右：內容 -->
<div>

<h1 id="product-title">產品介紹</h1>

<p id="product-summary"></p>

<!-- 🔥 規格 -->
<div class="info-card">
<h3>規格</h3>
<p id="product-sizes">—</p>
</div>

<!-- 🔥 包裝 -->
<div class="info-card">
<h3>包裝</h3>
<p id="product-package">—</p>
</div>

<!-- 🔥 成分 -->
<div class="info-card">
<h3>成分</h3>
<ul id="product-ingredients"></ul>
</div>

<!-- 🔥 使用方式 -->
<div class="info-card">
<h3>使用方式</h3>
<ul id="product-uses"></ul>
</div>

<!-- 🔥 CTA -->
<div class="product-actions">

<a id="product-line"
href="https://lin.ee/sHZW7NkR"
class="btn btn-line">
👉 LINE詢問
</a>

<a href="order.html" class="btn btn-dark">
👉 直接下單
</a>

</div>

<!-- 🔥 快速成交 -->
<div style="margin-top:20px">

<p style="font-weight:700">快速選👇</p>

<div style="display:flex;gap:10px;flex-wrap:wrap">

<button class="btn btn-outline-dark"
onclick="window.open('https://lin.ee/sHZW7NkR?text=我想日常保養怎麼搭')">
日常保養
</button>

<button class="btn btn-outline-dark"
onclick="window.open('https://lin.ee/sHZW7NkR?text=我最近比較累怎麼搭')">
最近比較累
</button>

<button class="btn btn-outline-dark"
onclick="window.open('https://lin.ee/sHZW7NkR?text=我想用來煮湯怎麼選')">
料理搭配
</button>

</div>

</div>

</div>

</div>

</section>

<!-- 🔥 延伸內容 -->
<section class="section" id="product-extra"></section>

<section class="cta">
<h2>不確定怎麼選？</h2>
<a href="https://lin.ee/sHZW7NkR" class="btn btn-line">
👉 幫我推薦
</a>
</section>

</main>

<a class="floating-line"
href="https://lin.ee/sHZW7NkR">
LINE詢問
</a>

<script src="product.js"></script>
<script src="site.js"></script>

</body>
</html>
