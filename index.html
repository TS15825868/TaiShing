
<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仙加味・龜鹿</title>
<link rel="stylesheet" href="site.css">
</head>
<body>

<header>
<img src="images/logo-seal.png" style="height:38px">
<h2>仙加味・龜鹿</h2>
</header>

<div class="container">

<h1>核心產品</h1>

<div class="grid">

<div class="card" onclick="openModal('龜鹿膏','濃縮膏型，可直接食用或溫水沖泡')">
<img src="images/guilu-gao.jpg">
<h3>龜鹿膏</h3>
</div>

<div class="card" onclick="openModal('龜鹿飲','液態型態，開封即可飲用')">
<img src="images/guilu-drink.jpg">
<h3>龜鹿飲</h3>
</div>

<div class="card" onclick="openModal('龜鹿湯塊','可燉雞湯排骨湯或保溫壺沖泡')">
<img src="images/guilu-block-300g.jpg">
<h3>龜鹿湯塊</h3>
</div>

<div class="card" onclick="openModal('鹿茸粉','粉末型，可沖泡或料理')">
<img src="images/lurong-powder.jpg">
<h3>鹿茸粉</h3>
</div>

</div>

<h2>龜鹿湯塊單塊示意</h2>
<img src="images/guilu-block-piece.jpg" style="max-width:420px">

<h2>料理搜尋</h2>
<input id="recipeSearch" placeholder="搜尋料理..." style="padding:8px;width:100%;margin-bottom:20px">

<div class="grid">
<div class="card recipe">龜鹿雞湯</div>
<div class="card recipe">龜鹿排骨湯</div>
<div class="card recipe">龜鹿藥膳雞</div>
<div class="card recipe">鹿茸粉燉雞</div>
<div class="card recipe">龜鹿雞粥</div>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-box">
<span class="close" onclick="closeModal()">×</span>
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
</div>
</div>

<script src="site.js"></script>
</body>
</html>
