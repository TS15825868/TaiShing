<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>仙加味｜龜鹿日常補養</title>
<meta name="description" content="龜鹿膏、龜鹿飲、龜鹿湯塊與鹿茸粉，建立你的日常補養節奏">
<link rel="stylesheet" href="site.css">
</head>

<body>

<header class="header">
  <div class="logo">仙加味</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div id="menuOverlay" class="menu-overlay"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">

    <h1>把龜鹿，變成日常的一部分</h1>

    <p>
      以龜板萃取物與鹿角萃取物為基礎，  
      轉化為膏、飲、湯塊與粉，  
      讓日常飲食更容易延續。
    </p>

    <button class="btn-line" onclick="openLine('幫我搭配')">
      👉 官方 LINE 諮詢
    </button>

  </div>
</section>

<!-- 快速入口 -->
<section class="section">

<h2>從這裡開始</h2>

<div class="grid">

<div class="card" onclick="startAI()">
<h3>幫我選</h3>
<p>依照你的習慣推薦</p>
</div>

<div class="card" onclick="openProduct('龜鹿膏')">
<h3>龜鹿膏</h3>
<p>日常食用型態</p>
</div>

<div class="card" onclick="openProduct('龜鹿湯塊')">
<h3>龜鹿湯塊</h3>
<p>燉煮料理使用</p>
</div>

</div>

</section>

<!-- 使用說明 -->
<section class="section">

<h2>怎麼使用</h2>

<ul class="list">
<li>膏：可直接食用或加入溫水</li>
<li>飲：開封即可飲用</li>
<li>湯塊：加入雞湯或排骨湯燉煮</li>
<li>粉：加入熱水、茶或咖啡</li>
</ul>

</section>

<!-- CTA -->
<section class="section center">

<p>不確定怎麼選也沒關係</p>

<button class="btn-line" onclick="openLine('幫我搭配')">
👉 直接幫我搭配
</button>

</section>

<div id="aiBox"></div>
<div id="modal"></div>

<script src="site.js"></script>

</body>
</html>
