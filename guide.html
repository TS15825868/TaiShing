不同型態的使用方式
</p>

<div class="container">

<section class="section">

<div class="content-block">

<h2>龜鹿膏</h2>

<p>
龜鹿膏為濃縮膏體型態，
可直接食用，也可加入溫水或熱飲。
</p>

<ul>
<li>直接食用</li>
<li>加入溫水沖泡</li>
<li>加入牛奶或熱飲</li>
</ul>

</div>

</section>

<section class="section">

<div class="content-block">

<h2>龜鹿飲</h2>

<p>
龜鹿飲為液態型態，
開封即可飲用。
</p>

<ul>
<li>常溫飲用</li>
<li>冷藏飲用</li>
</ul>

</div>

</section>

<section class="section">

<div class="content-block">

<h2>龜鹿湯塊</h2>

<p>
龜鹿湯塊適合燉湯料理，
常見於雞湯或排骨湯。
</p>

<ul>
<li>雞湯</li>
<li>排骨湯</li>
<li>藥膳湯</li>
</ul>

</div>

</section>

<section class="section">

<div class="content-block">

<h2>鹿茸粉</h2>

<p>
鹿茸粉為粉末型態，
可加入各類飲品。
</p>

<ul>
<li>熱水</li>
<li>茶</li>
<li>咖啡</li>
<li>牛奶</li>
</ul>

</div>

</section>

</div>
