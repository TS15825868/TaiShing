<section class="hero"><div class="hero-grid"><div class="hero-copy"><span class="eyebrow">使用指南</span><h1>先選型態，再安排節奏</h1><p>以日常飲食與生活節奏為主，不談療效式說法。先看型態，再看作息，最後選規格，會比一次塞進太多資訊更容易開始。</p></div><div class="hero-visual reveal"><img src="images/hero.jpg" alt="怎麼使用"></div></div></section>
<section class="section section-tight"><div class="section-head"><div><h2>三步驟開始</h2><p>把選擇變簡單，先建立理解，再進一步搭配。</p></div></div><div class="compare-grid" data-render="guide"></div></section>
<section class="section"><div data-render="seasonal"></div></section>
<section class="section"><div class="section-head"><div><h2>實際選法</h2><p>想固定節奏，先看膏；想快速方便，先看飲；想進餐桌，先看湯塊；想自由搭配，先看粉。</p></div></div><div class="compare-grid"><article class="panel reveal"><h3>先選型態，不先背一堆資料</h3><p>膏、飲、湯塊、粉的差異，主要在使用場景與生活方式不同。</p></article><article class="panel reveal"><h3>先從容易開始的份量出發</h3><p>很多人不是不知道要不要用，而是不知道怎麼開始。從自己覺得好執行的方式開始，會更容易建立節奏。</p></article></div></section>
