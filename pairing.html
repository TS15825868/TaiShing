    .list{margin:0;padding-left:18px;}

    .footnote{
      margin-top:10px;color:var(--muted);font-size:13px;
      border-top:1px dashed rgba(255,255,255,.15);padding-top:10px;
    }
    .two{grid-column:span 12;}
    @media (min-width: 900px){
      .two{grid-column:span 6;}

</div>

<h2 class="h2">搭配的核心：簡單、可持續</h2>

<li><b>湯塊</b>：雞肉、排骨、山藥等日常食材皆可搭配燉煮。</li>
<li><b>龜鹿膏</b>：作為日常補養的一部分，依個人節奏食用。</li>
<li><b>龜鹿飲</b>：日常飲用更方便，適合外出攜帶。</li>
