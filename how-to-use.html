<h1>怎麼使用龜鹿產品</h1>

<h2>龜鹿膏</h2>
<ul>
<li>可直接食用</li>
<li>可加入溫熱開水攪拌</li>
<li>可搭配早餐或下午食用</li>
</ul>

<p>👉 建議：早上或下午食用，避免晚上影響休息</p>

---

<h2>龜鹿飲</h2>
<ul>
<li>開封即可飲用</li>
<li>可隔水加熱後飲用</li>
</ul>

<p>👉 建議：每日一瓶，溫熱飲用更順口</p>

---

<h2>龜鹿湯塊</h2>
<ul>
<li>雞湯</li>
<li>排骨湯</li>
<li>日常燉湯</li>
</ul>

<p>👉 建議：一鍋放1～2塊</p>

---

<h2>鹿茸粉</h2>
<ul>
<li>加入熱水</li>
<li>加入咖啡或茶</li>
</ul>
