<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>觀點影片</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>補養觀點</h1>
<p>用最簡單方式理解補養</p>
</section>

<div id="video-list"></div>

</main>

<div id="app-footer"></div>

<script src="site.js"></script>

<script>
fetch('videos.json')
.then(res=>res.json())
.then(data=>{
  let html='';
  data.forEach(v=>{
    html+=`
    <section class="card">
      <h3>${v.title}</h3>
      <a href="${v.url}" target="_blank" class="btn btn-primary">
        👉 觀看影片
      </a>
    </section>
    `;
  });
  document.getElementById('video-list').innerHTML=html;
});
</script>

</body>
</html>
