<script>
document.addEventListener("DOMContentLoaded", async () => {

  const grid = document.getElementById("product-grid");

  try {
    const res = await fetch("./products.json", { cache: "no-store" });
    const data = await res.json();

    if (!data.products || !data.products.length) {
      grid.innerHTML = "<p>目前尚未設定產品資料。</p>";
      return;
    }

    // 產生產品卡片
    grid.innerHTML = data.products.map(p => `
      <article class="product-card">
        <a href="${p.url}" class="card-link" aria-label="${p.name}"></a>
        <div class="product-image-frame">
          <img src="${p.image}" alt="${p.name}" loading="lazy">
        </div>
        <h3 class="product-name">${p.name}</h3>
        <p class="product-note">${p.note || ""}</p>
      </article>
    `).join("");

    // 產生 Schema ItemList
    const schema = {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": data.products.map((p, i) => ({
        "@type": "ListItem",
        "position": i + 1,
        "url": "https://ts15825868.github.io/TaiShing/" + p.url
      }))
    };

    const script = document.createElement("script");
    script.type = "application/ld+json";
    script.textContent = JSON.stringify(schema);
    document.head.appendChild(script);

  } catch (err) {
    console.error(err);
    grid.innerHTML = "<p>讀取產品資料失敗，請確認 products.json 已上傳。</p>";
  }

});
</script>

<script src="main.js" defer></script>

</body>
