<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產品總覽｜仙加味</title>
<link rel="stylesheet" href="site.css">
</head>

<body>

<div id="app-header"></div>

<main>

<section class="card">
<h1>選擇適合你的補養方式</h1>
<p>不是選最強，而是選最適合自己的節奏。</p>
</section>

<div id="product-list"></div>

</main>

<!-- Modal -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">

    <h2 id="modal-title"></h2>
    <img id="modal-img">

    <p id="modal-desc"></p>

    <div id="modal-detail"></div>

    <a id="line-link" class="btn btn-primary">👉 LINE詢問</a>

  </div>
</div>

<div id="app-footer"></div>

<script src="site.js"></script>

<script>
fetch('products.json')
.then(res => res.json())
.then(data => {

  let html = '';

  data.forEach(p => {
    html += `
      <section class="card product" onclick="openProductModal('${p.id}')">
        <img src="${p.img}">
        <h3>${p.name}｜${p.title}</h3>
        <p>${p.desc}</p>
      </section>
    `;
  });

  document.getElementById('product-list').innerHTML = html;

  window.productsData = data;
});


function openProductModal(id){
  const p = window.productsData.find(x => x.id === id);

  document.getElementById("modal").style.display="flex";
  document.getElementById("modal-title").innerText = p.name + "｜" + p.title;
  document.getElementById("modal-img").src = p.img;
  document.getElementById("modal-desc").innerText = p.desc;

  let detail = `
    <p><b>規格：</b>${p.spec}</p>
    <p><b>成分：</b>${p.ingredient}</p>

    <p><b>使用方式：</b></p>
    <ul>
      ${p.usage.map(u=>`<li>${u}</li>`).join('')}
    </ul>

    <p><b>適合族群：</b></p>
    <ul>
      ${p.target.map(t=>`<li>${t}</li>`).join('')}
    </ul>
  `;

  document.getElementById("modal-detail").innerHTML = detail;

  document.getElementById("line-link").href =
    "https://line.me/R/ti/p/@762jybnm?text=" +
    encodeURIComponent(p.lineText);
}
</script>

</body>
</html>
