<h1>龜鹿文化</h1>

<p class="hero-sub">
傳統食材的飲食整理
</p>

<p>
龜板與鹿角在傳統文化中已有長久歷史，
仙加味將這些食材整理成更容易理解的日常飲食型態。
</p>

</div>

<div class="container">

<section class="section">

<div class="content-block">

<h2>龜板</h2>

<p>
龜板為傳統文化中常見的食材之一，
在許多古籍中都可見相關記載。
</p>

<p>
龜板多以長時間熬煮的方式處理，
讓食材成分能融入湯品或膏體之中。
</p>

</div>

</section>


<section class="section">

<div class="content-block">

<h2>鹿角</h2>

<p>
鹿角同樣是歷史悠久的食材，
常見於各類飲食與燉湯文化中。
</p>

<p>
鹿角與龜板搭配後，
逐漸形成所謂「龜鹿」的飲食文化。
</p>

</div>

</section>


<section class="section">

<div class="content-block">

<h2>龜鹿飲食型態</h2>

<p>
隨著飲食習慣改變，
龜鹿逐漸整理出不同型態：
</p>

<p>
龜鹿膏  
龜鹿飲  
龜鹿湯塊  
鹿茸粉
</p>

<p>
不同型態對應不同使用方式，
讓傳統食材更容易融入現代生活。
</p>

</div>

</section>
